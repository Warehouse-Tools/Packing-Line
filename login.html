<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Packing Line - Browser</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f0f2f5;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }
    
    .container {
      background: white;
      border-radius: 20px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.15);
      padding: 35px;
      max-width: 550px;
      width: 100%;
      text-align: center;
    }
    
    .logo { font-size: 64px; margin-bottom: 15px; }
    h1 { color: #1a73e8; font-size: 24px; margin-bottom: 5px; }
    .subtitle { color: #666; font-size: 14px; margin-bottom: 20px; }
    
    .session-info {
      background: #f8fafc;
      padding: 15px;
      border-radius: 12px;
      margin: 15px 0;
      border-left: 4px solid #1a73e8;
      text-align: left;
    }
    .session-info .row {
      display: flex;
      justify-content: space-between;
      padding: 4px 0;
      border-bottom: 1px solid #f0f0f0;
      font-size: 14px;
    }
    .session-info .row:last-child { border-bottom: none; }
    .session-info .label { font-weight: 600; color: #555; }
    .session-info .value { color: #333; }
    
    .timer {
      font-size: 36px;
      font-weight: 700;
      color: #1a73e8;
      margin: 10px 0;
    }
    
    .url-input-group {
      display: flex;
      gap: 8px;
      margin: 15px 0;
    }
    .url-input-group input {
      flex: 1;
      padding: 12px 16px;
      border: 2px solid #e0e0e0;
      border-radius: 10px;
      font-size: 14px;
      outline: none;
    }
    .url-input-group input:focus { border-color: #1a73e8; }
    .url-input-group button {
      padding: 12px 24px;
      background: #1a73e8;
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      white-space: nowrap;
    }
    .url-input-group button:hover { opacity: 0.9; }
    
    .btn-group {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin: 10px 0;
    }
    .btn-group button {
      flex: 1;
      padding: 10px 16px;
      border: none;
      border-radius: 8px;
      font-weight: 600;
      font-size: 13px;
      cursor: pointer;
      min-width: 70px;
    }
    .btn-group .btn-home { background: #1a73e8; color: white; }
    .btn-group .btn-back { background: #795548; color: white; }
    .btn-group .btn-logout { background: #e53935; color: white; }
    .btn-group .btn-check { background: #ff9800; color: white; }
    .btn-group .btn-request { background: #ff9800; color: white; }
    
    .toast {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: #e53935;
      color: white;
      padding: 12px 24px;
      border-radius: 10px;
      font-weight: 700;
      font-size: 14px;
      z-index: 9999;
      display: none;
      box-shadow: 0 4px 20px rgba(0,0,0,0.2);
    }
    .toast.show { display: block; }
    
    .session-id {
      background: #f0f0f0;
      padding: 6px 12px;
      border-radius: 6px;
      font-size: 11px;
      color: #666;
      margin-top: 10px;
    }
    
    .history-list {
      margin-top: 10px;
      text-align: left;
      max-height: 150px;
      overflow-y: auto;
    }
    .history-list .item {
      padding: 4px 8px;
      font-size: 12px;
      color: #1a73e8;
      cursor: pointer;
      border-bottom: 1px solid #f0f0f0;
    }
    .history-list .item:hover { background: #e8f0fe; }
    
    @media (max-width: 500px) {
      .container { padding: 20px; }
      .timer { font-size: 28px; }
      .url-input-group { flex-direction: column; }
      .url-input-group button { width: 100%; }
    }
  </style>
</head>
<body>

<!-- ===== TOAST ===== -->
<div id="toast" class="toast">⚠️ Notifikasi</div>

<!-- ===== MAIN CONTAINER ===== -->
<div class="container">
  <div class="logo">🌐</div>
  <h1>PACKING LINE</h1>
  <p class="subtitle">BROWSER SESSION</p>
  
  <!-- Timer -->
  <div class="timer" id="timerDisplay">00:00:00</div>
  
  <!-- Session Info -->
  <div class="session-info">
    <div class="row"><span class="label">👤 Nama</span><span class="value" id="sNama">-</span></div>
    <div class="row"><span class="label">🏭 Line</span><span class="value" id="sLine">-</span></div>
    <div class="row"><span class="label">📌 Tipe</span><span class="value" id="sType">-</span></div>
    <div class="row"><span class="label">🕐 Login</span><span class="value" id="sLogin">-</span></div>
  </div>
  <div class="session-id" id="sSessionId">🆔 Session ID: -</div>
  
  <!-- URL Input -->
  <div class="url-input-group">
    <input type="text" id="urlInput" placeholder="Ketik URL... (contoh: google.com)" onkeydown="if(event.key==='Enter'){openUrl();}">
    <button onclick="openUrl()">🔗 Buka</button>
  </div>
  
  <!-- Quick Buttons -->
  <div class="btn-group">
    <button class="btn-home" onclick="openUrl('https://www.google.com')">🔍 Google</button>
    <button class="btn-home" onclick="openUrl('https://www.bing.com')">🔍 Bing</button>
    <button class="btn-home" onclick="openUrl('https://duckduckgo.com')">🦆 DuckDuckGo</button>
  </div>
  <div class="btn-group">
    <button class="btn-request" onclick="requestNewTab()">📩 Request Tab Baru</button>
    <button class="btn-check" onclick="checkSession()">🔍 CEK SESSION</button>
    <button class="btn-back" onclick="goBackToLogin()">⬅️ Kembali</button>
    <button class="btn-logout" onclick="performLogout()">🔒 LOGOUT</button>
  </div>
  
  <!-- History -->
  <div style="margin-top:15px;font-size:12px;color:#999;text-align:left;">
    📂 History: <span id="historyCount">0</span>
    <button onclick="clearHistory()" style="background:transparent;border:none;color:#e53935;cursor:pointer;font-size:11px;">✕ Hapus</button>
  </div>
  <div class="history-list" id="historyList"></div>
</div>

<script>
  // ============ KONFIGURASI ============
  var API_URL = 'https://script.google.com/macros/s/AKfycbwvQNFe9PVrXnh1rP-s41VWKO-KcLO-NfC-bPdabMbr5V1AvgwEnEizfkiQQPOmy0ug/exec';
  // ============================================

  var currentSession = null;
  var timerInterval = null;
  var historyUrls = [];
  var checkInterval = null;

  // ============ TOAST ============
  function showToast(msg) {
    var t = document.getElementById('toast');
    t.textContent = msg || '⚠️ Notifikasi';
    t.className = 'toast show';
    clearTimeout(t._t);
    t._t = setTimeout(function(){ t.className = 'toast'; }, 3000);
  }

  // ============ RESTORE SESSION ============
  function restoreSession() {
    var params = new URLSearchParams(window.location.search);
    var sessionId = params.get('sessionId');
    var nama = params.get('nama');
    var line = params.get('line');
    var type = params.get('type');
    var loginTime = params.get('loginTime');

    if (sessionId && nama && line && type) {
      currentSession = {
        id: sessionId,
        nama: nama,
        line: line,
        type: type,
        loginTime: new Date(loginTime || Date.now())
      };
      localStorage.setItem('packingSession', JSON.stringify(currentSession));
      return true;
    }

    var s = localStorage.getItem('packingSession');
    if (s) {
      try {
        var p = JSON.parse(s);
        currentSession = p;
        currentSession.loginTime = new Date(p.loginTime);
        return true;
      } catch(e) {
        localStorage.removeItem('packingSession');
      }
    }
    return false;
  }

  // ============ UPDATE DISPLAY ============
  function updateDisplay() {
    if (!currentSession) return;
    
    var d = Math.floor((new Date() - currentSession.loginTime) / 1000);
    var h = Math.floor(d / 3600);
    var m = Math.floor((d % 3600) / 60);
    var s = d % 60;
    var timer = (h < 10 ? '0' + h : h) + ':' + (m < 10 ? '0' + m : m) + ':' + (s < 10 ? '0' + s : s);
    
    document.getElementById('timerDisplay').textContent = timer;
    document.getElementById('sNama').textContent = currentSession.nama;
    document.getElementById('sLine').textContent = currentSession.line;
    document.getElementById('sType').textContent = currentSession.type;
    document.getElementById('sLogin').textContent = currentSession.loginTime.toLocaleString('id-ID');
    document.getElementById('sSessionId').textContent = '🆔 Session ID: ' + currentSession.id;
  }

  // ============ OPEN URL (DI TAB BARU) ============
  function openUrl(url) {
    var input = document.getElementById('urlInput');
    var targetUrl = url || input.value.trim();
    
    if (!targetUrl) {
      showToast('⚠️ Masukkan URL terlebih dahulu');
      return;
    }
    
    if (!targetUrl.startsWith('http://') && !targetUrl.startsWith('https://')) {
      targetUrl = 'https://' + targetUrl;
    }
    
    // Buka di tab baru
    var newTab = window.open(targetUrl, '_blank');
    if (!newTab) {
      alert('⚠️ Popup diblokir! Izinkan popup untuk membuka browser.\n\nKlik ikon popup di address bar dan pilih "Always allow".');
      showToast('⚠️ Popup diblokir! Izinkan popup.');
      return;
    }
    
    showToast('🌐 Membuka: ' + targetUrl);
    input.value = targetUrl;
    
    // Simpan history
    if (!historyUrls.includes(targetUrl)) {
      historyUrls.push(targetUrl);
      updateHistory();
    }
  }

  // ============ HISTORY ============
  function updateHistory() {
    var list = document.getElementById('historyList');
    var count = document.getElementById('historyCount');
    count.textContent = historyUrls.length;
    
    if (historyUrls.length === 0) {
      list.innerHTML = '<div style="color:#ccc;text-align:center;padding:10px;">Belum ada history</div>';
      return;
    }
    
    var html = '';
    for (var i = historyUrls.length - 1; i >= 0; i--) {
      var url = historyUrls[i];
      var displayUrl = url.length > 50 ? url.substring(0, 50) + '...' : url;
      html += '<div class="item" onclick="openUrl(\'' + url + '\')">📄 ' + displayUrl + '</div>';
    }
    list.innerHTML = html;
  }

  function clearHistory() {
    historyUrls = [];
    updateHistory();
    showToast('🗑️ History dihapus');
  }

  // ============ REQUEST TAB BARU ============
  function requestNewTab() {
    if(!currentSession) {
      alert('⚠️ Silakan login terlebih dahulu.');
      return;
    }

    var reason = prompt('📝 Alasan request tab baru:', 'Membutuhkan tab tambahan untuk bekerja');
    if (!reason) return;

    var tlName = localStorage.getItem('tlName') || '';

    showToast('📩 Mengirim request ke TL...');

    fetch(API_URL,{
      method:'POST',
      headers:{'Content-Type':'application/x-www-form-urlencoded'},
      body:'action=requestNewTab&data='+encodeURIComponent(JSON.stringify({
        sessionId: currentSession.id,
        nama: currentSession.nama,
        line: currentSession.line,
        teamLeader: tlName,
        reason: reason
      }))
    })
    .then(function(r){ return r.json(); })
    .then(function(r){
      if(r.success){
        alert('✅ Request terkirim! Tunggu approve dari Team Leader.');
        showToast('📩 Request terkirim. Tunggu approve dari TL.');
      } else {
        alert('❌ Gagal: ' + (r.message || 'Unknown error'));
      }
    })
    .catch(function(e){
      alert('❌ Gagal mengirim request: ' + e.message);
    });
  }

  // ============ CEK SESSION ============
  function checkSession() {
    if(!currentSession) {
      alert('Tidak ada session aktif');
      return;
    }

    showToast('🔍 Mengecek session...');

    fetch(API_URL,{
      method:'POST',
      headers:{'Content-Type':'application/x-www-form-urlencoded'},
      body:'action=getDashboard&data='+encodeURIComponent(JSON.stringify({}))
    })
    .then(function(r){ return r.json(); })
    .then(function(d){
      var all = [];
      if(d && d.activeStaff) { if(Array.isArray(d.activeStaff)) all = all.concat(d.activeStaff); }
      if(d && d.activeOJT) { if(Array.isArray(d.activeOJT)) all = all.concat(d.activeOJT); }
      if(d && d.activeDW) { if(Array.isArray(d.activeDW)) all = all.concat(d.activeDW); }

      var found = false;
      for(var i=0;i<all.length;i++){
        var serverId = all[i].row || all[i].sessionId || all[i].id || '';
        if(String(serverId) === String(currentSession.id)){
          found = true;
          break;
        }
      }

      if(found) {
        alert('✅ Session masih aktif di server!\n\nSession ID: ' + currentSession.id);
      } else if(all.length > 0) {
        alert('⚠️ Sesi anda TIDAK DITEMUKAN di server!\nAnda mungkin sudah di-force logout oleh Team Leader.');
        clearSavedSession();
        currentSession = null;
        if (timerInterval) clearInterval(timerInterval);
        if (checkInterval) clearInterval(checkInterval);
        setTimeout(function() { goBackToLogin(); }, 1500);
      } else {
        alert('⚠️ Tidak bisa mengecek session (data server kosong)');
      }
    })
    .catch(function(e){
      alert('❌ Gagal cek session: ' + e.message);
    });
  }

  // ============ AUTO CHECK SESSION ============
  function startAutoCheck() {
    if (checkInterval) clearInterval(checkInterval);
    checkInterval = setInterval(function() {
      if (!currentSession) {
        clearInterval(checkInterval);
        checkInterval = null;
        return;
      }
      
      var s = localStorage.getItem('packingSession');
      if (!s) {
        showToast('⚠️ Session telah berakhir!');
        clearSavedSession();
        currentSession = null;
        if (timerInterval) clearInterval(timerInterval);
        setTimeout(function() { goBackToLogin(); }, 1500);
        return;
      }
      
      try {
        var p = JSON.parse(s);
        if (p.id !== currentSession.id) {
          showToast('⚠️ Session telah berakhir!');
          clearSavedSession();
          currentSession = null;
          if (timerInterval) clearInterval(timerInterval);
          setTimeout(function() { goBackToLogin(); }, 1500);
        }
      } catch(e) {
        showToast('⚠️ Session error!');
        clearSavedSession();
        currentSession = null;
        if (timerInterval) clearInterval(timerInterval);
        setTimeout(function() { goBackToLogin(); }, 1500);
      }
    }, 10000);
  }

  // ============ SESSION ============
  function clearSavedSession() {
    localStorage.removeItem('packingSession');
  }

  // ============ GO BACK TO LOGIN ============
  function goBackToLogin() {
    var loginUrl = window.location.href.replace('packing.html', 'login.html');
    if (loginUrl === window.location.href) {
      var parts = window.location.href.split('/');
      parts.pop();
      loginUrl = parts.join('/') + '/login.html';
    }
    window.location.href = loginUrl;
  }

  // ============ LOGOUT ============
  function performLogout() {
    if (!currentSession || !confirm('Yakin ingin logout?')) return;

    showToast('🔒 Logout...');

    fetch(API_URL,{
      method:'POST',
      headers:{'Content-Type':'application/x-www-form-urlencoded'},
      body:'action=logout&data='+encodeURIComponent(JSON.stringify({sessionId:currentSession.id}))
    })
    .then(function(r){ return r.json(); })
    .then(function(r){
      if(r.success){
        showToast('🔒 Logout berhasil!');
        if (timerInterval) clearInterval(timerInterval);
        if (checkInterval) clearInterval(checkInterval);
        clearSavedSession();
        currentSession = null;
        setTimeout(function() { goBackToLogin(); }, 1000);
      } else {
        alert('❌ Gagal logout: ' + r.message);
      }
    })
    .catch(function(e){
      alert('❌ Gagal logout: ' + e.message);
    });
  }

  // ============ INIT ============
  function init() {
    if (!restoreSession()) {
      document.body.innerHTML = '<div style="text-align:center;padding:50px;background:white;border-radius:20px;max-width:400px;margin:auto;"><p style="font-size:48px;">🔒</p><h3>Tidak ada session aktif</h3><p style="color:#666;margin-top:10px;">Silakan login dari halaman utama.</p><button onclick="goBackToLogin()" style="margin-top:20px;background:#1a73e8;color:white;border:none;padding:12px 30px;border-radius:8px;cursor:pointer;font-weight:700;width:auto;">Kembali ke Login</button></div>';
      return;
    }

    // Update display
    updateDisplay();
    if (timerInterval) clearInterval(timerInterval);
    timerInterval = setInterval(updateDisplay, 1000);

    // Auto check
    startAutoCheck();

    // Load history
    updateHistory();

    // Focus input
    document.getElementById('urlInput').focus();

    showToast('🌐 Browser siap digunakan');
  }

  window.onload = init;
</script>
</body>
</html>
