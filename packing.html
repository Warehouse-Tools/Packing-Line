<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Packing Line - Browser</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      height: 100%;
      font-family: 'Segoe UI', sans-serif;
      background: #f0f2f5;
    }
    
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }
    
    .container {
      background: white;
      border-radius: 20px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.15);
      padding: 25px;
      max-width: 500px;
      width: 100%;
      text-align: center;
      position: relative;
    }
    
    .logo { font-size: 36px; margin-bottom: 5px; }
    h1 { color: #1a73e8; font-size: 18px; margin-bottom: 2px; }
    .subtitle { color: #666; font-size: 11px; margin-bottom: 10px; }
    
    .timer-big {
      font-size: 28px;
      font-weight: 700;
      color: #1a73e8;
      margin: 5px 0;
    }
    
    .session-info {
      background: #f8fafc;
      padding: 8px 12px;
      border-radius: 10px;
      margin: 8px 0;
      border-left: 3px solid #1a73e8;
      text-align: left;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1px 10px;
      font-size: 12px;
    }
    .session-info .row {
      display: flex;
      justify-content: space-between;
      padding: 1px 0;
    }
    .session-info .label { font-weight: 600; color: #555; }
    .session-info .value { color: #333; }
    .session-info .full { grid-column: 1 / -1; }
    
    .session-id {
      background: #f0f0f0;
      padding: 3px 10px;
      border-radius: 4px;
      font-size: 10px;
      color: #666;
      margin-top: 5px;
      display: inline-block;
    }
    
    .url-input-group {
      display: flex;
      gap: 6px;
      margin: 10px 0;
    }
    .url-input-group input {
      flex: 1;
      padding: 8px 12px;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      font-size: 13px;
      outline: none;
    }
    .url-input-group input:focus { border-color: #1a73e8; }
    .url-input-group button {
      padding: 8px 16px;
      background: #1a73e8;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      white-space: nowrap;
    }
    .url-input-group button:hover { opacity: 0.9; }
    
    .btn-group {
      display: flex;
      gap: 5px;
      flex-wrap: wrap;
      margin: 6px 0;
    }
    .btn-group button {
      flex: 1;
      padding: 6px 10px;
      border: none;
      border-radius: 6px;
      font-weight: 600;
      font-size: 11px;
      cursor: pointer;
      min-width: 50px;
    }
    .btn-group .btn-home { background: #1a73e8; color: white; }
    .btn-group .btn-back { background: #795548; color: white; }
    .btn-group .btn-logout { background: #e53935; color: white; }
    .btn-group .btn-check { background: #ff9800; color: white; }
    .btn-group .btn-request { background: #ff9800; color: white; }
    
    .toast {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: #e53935;
      color: white;
      padding: 8px 16px;
      border-radius: 8px;
      font-weight: 700;
      font-size: 12px;
      z-index: 9999;
      display: none;
      box-shadow: 0 4px 20px rgba(0,0,0,0.2);
    }
    .toast.show { display: block; }
    
    .history-list {
      margin-top: 6px;
      text-align: left;
      max-height: 100px;
      overflow-y: auto;
      border-top: 1px solid #f0f0f0;
      padding-top: 6px;
    }
    .history-list .item {
      padding: 2px 8px;
      font-size: 11px;
      color: #1a73e8;
      cursor: pointer;
      border-bottom: 1px solid #f0f0f0;
    }
    .history-list .item:hover { background: #e8f0fe; }
    
    .refresh-info {
      font-size: 9px;
      color: #999;
      margin-top: 8px;
    }
    
    /* ===== FLOATING TIMESTAMP (KECIL) ===== */
    .float-timer {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: white;
      border-radius: 12px;
      box-shadow: 0 8px 30px rgba(0,0,0,0.3);
      z-index: 9997;
      border: 1px solid #e0e0e0;
      min-width: 140px;
      max-width: 200px;
      overflow: hidden;
      transition: all 0.3s;
      animation: slideUp 0.3s ease;
      cursor: move;
      user-select: none;
    }
    .float-timer.hidden { display: none; }
    @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    
    .float-header {
      background: #1a73e8;
      color: white;
      padding: 4px 10px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .float-header .title { font-weight: 700; font-size: 10px; }
    .float-header .timer-badge { font-size: 11px; font-weight: 700; background: rgba(255,255,255,0.2); padding: 2px 8px; border-radius: 10px; }
    .float-header .float-actions { display: flex; gap: 3px; }
    .float-header .float-actions button {
      background: rgba(255,255,255,0.2);
      border: none;
      color: white;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      cursor: pointer;
      font-size: 9px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0;
      margin: 0;
      transition: 0.2s;
    }
    .float-header .float-actions button:hover { background: rgba(255,255,255,0.4); }
    .float-header .float-actions .close-float:hover { background: #e53935; }
    
    .float-body {
      padding: 5px 10px;
      font-size: 10px;
    }
    .float-body .row {
      display: flex;
      justify-content: space-between;
      padding: 1px 0;
      border-bottom: 1px solid #f0f0f0;
    }
    .float-body .row:last-child { border-bottom: none; }
    .float-body .label { font-weight: 600; color: #555; }
    .float-body .value { color: #333; }
    .float-body .session-id-small {
      background: #f0f0f0;
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 8px;
      color: #666;
      text-align: center;
      margin-top: 3px;
    }
    
    .float-timer.minimized { min-width: 80px; max-width: 100px; }
    .float-timer.minimized .float-body { display: none; }
    .float-timer.minimized .float-header .timer-badge { display: none; }
    .float-timer.minimized .float-header .title { font-size: 9px; }
    
    @media (max-width: 500px) {
      .container { padding: 15px; }
      .timer-big { font-size: 22px; }
      .url-input-group { flex-direction: column; }
      .url-input-group button { width: 100%; }
      .session-info { grid-template-columns: 1fr; }
      .float-timer { min-width: 120px; right: 10px; bottom: 10px; }
    }
  </style>
</head>
<body>

<!-- ===== TOAST ===== -->
<div id="toast" class="toast">⚠️ Notifikasi</div>

<!-- ===== FLOATING TIMESTAMP (KECIL) ===== -->
<div class="float-timer" id="floatTimer">
  <div class="float-header" id="floatHeader">
    <span class="title">⏱️ Sesi</span>
    <span class="timer-badge" id="floatTime">00:00:00</span>
    <div class="float-actions">
      <button onclick="minimizeFloat()" title="Minimize" id="floatMinBtn">─</button>
      <button class="close-float" onclick="hideFloat()" title="Tutup">✕</button>
    </div>
  </div>
  <div class="float-body">
    <div class="row"><span class="label">👤</span><span class="value" id="fNama">-</span></div>
    <div class="row"><span class="label">📍</span><span class="value" id="fLine">-</span></div>
    <div class="row"><span class="label">📌</span><span class="value" id="fType">-</span></div>
    <div class="session-id-small" id="fSessionId">🆔 ID: -</div>
  </div>
</div>

<!-- ===== MAIN CONTAINER ===== -->
<div class="container">
  <div class="logo">🌐</div>
  <h1>PACKING LINE</h1>
  <p class="subtitle">BROWSER SESSION</p>
  
  <!-- Timer Besar -->
  <div class="timer-big" id="timerDisplay">00:00:00</div>
  
  <!-- Session Info -->
  <div class="session-info">
    <div class="row"><span class="label">👤 Nama</span><span class="value" id="sNama">-</span></div>
    <div class="row"><span class="label">🏭 Line</span><span class="value" id="sLine">-</span></div>
    <div class="row"><span class="label">📌 Tipe</span><span class="value" id="sType">-</span></div>
    <div class="row full"><span class="label">🕐 Login</span><span class="value" id="sLogin">-</span></div>
  </div>
  <div class="session-id" id="sSessionId">🆔 Session ID: -</div>
  
  <!-- Info -->
  <div style="background:#e8f0fe;padding:8px 12px;border-radius:8px;margin:8px 0;font-size:11px;color:#1a73e8;text-align:left;">
    💡 Ketik URL, klik Go atau Enter untuk membuka di tab baru.
  </div>
  
  <!-- URL Input -->
  <div class="url-input-group">
    <input type="text" id="urlInput" placeholder="Ketik URL..." onkeydown="if(event.key==='Enter'){openUrl();}">
    <button onclick="openUrl()">🔗 Buka</button>
  </div>
  
  <!-- Quick Buttons -->
  <div class="btn-group">
    <button class="btn-home" onclick="openUrl('https://www.google.com')">🔍 Google</button>
    <button class="btn-home" onclick="openUrl('https://www.bing.com')">🔍 Bing</button>
    <button class="btn-home" onclick="openUrl('https://duckduckgo.com')">🦆 DuckDuckGo</button>
  </div>
  <div class="btn-group">
    <button class="btn-request" onclick="requestNewTab()">📩 Request</button>
    <button class="btn-check" onclick="checkSession()">🔍 Cek</button>
    <button class="btn-back" onclick="goBackToLogin()">⬅️ Kembali</button>
    <button class="btn-logout" onclick="performLogout()">🔒 LOGOUT</button>
  </div>
  
  <!-- History -->
  <div style="margin-top:8px;font-size:11px;color:#999;text-align:left;display:flex;justify-content:space-between;align-items:center;">
    <span>📂 History: <span id="historyCount">0</span></span>
    <button onclick="clearHistory()" style="background:transparent;border:none;color:#e53935;cursor:pointer;font-size:10px;font-weight:600;">✕ Hapus</button>
  </div>
  <div class="history-list" id="historyList"></div>
  
  <div class="refresh-info">💡 Refresh aman - session tersimpan</div>
</div>

<script>
  // ============ KONFIGURASI ============
  var API_URL = 'https://script.google.com/macros/s/AKfycbwvQNFe9PVrXnh1rP-s41VWKO-KcLO-NfC-bPdabMbr5V1AvgwEnEizfkiQQPOmy0ug/exec';
  // ============================================

  var currentSession = null;
  var timerInterval = null;
  var historyUrls = [];
  var checkInterval = null;
  var floatMinimized = false;
  var floatDragData = { isDragging: false, offsetX: 0, offsetY: 0 };

  // ============ TOAST ============
  function showToast(msg) {
    var t = document.getElementById('toast');
    t.textContent = msg || '⚠️ Notifikasi';
    t.className = 'toast show';
    clearTimeout(t._t);
    t._t = setTimeout(function(){ t.className = 'toast'; }, 3000);
  }

  // ============ RESTORE SESSION ============
  function restoreSession() {
    var s = localStorage.getItem('packingSession');
    if (s) {
      try {
        var p = JSON.parse(s);
        if (p && p.id && p.nama) {
          currentSession = {
            id: p.id,
            nama: p.nama,
            line: p.line,
            type: p.type,
            teamLeader: p.teamLeader || null,
            loginTime: new Date(p.loginTime)
          };
          return true;
        }
      } catch(e) {
        localStorage.removeItem('packingSession');
      }
    }

    var params = new URLSearchParams(window.location.search);
    var sessionId = params.get('sessionId');
    var nama = params.get('nama');
    var line = params.get('line');
    var type = params.get('type');
    var loginTime = params.get('loginTime');

    if (sessionId && nama && line && type) {
      currentSession = {
        id: sessionId,
        nama: nama,
        line: line,
        type: type,
        teamLeader: params.get('teamLeader') || null,
        loginTime: new Date(loginTime || Date.now())
      };
      var dataToSave = {
        id: sessionId,
        nama: nama,
        line: line,
        type: type,
        teamLeader: params.get('teamLeader') || null,
        loginTime: loginTime || new Date().toISOString()
      };
      localStorage.setItem('packingSession', JSON.stringify(dataToSave));
      return true;
    }

    return false;
  }

  // ============ UPDATE DISPLAY ============
  function updateDisplay() {
    if (!currentSession) return;
    
    var d = Math.floor((new Date() - currentSession.loginTime) / 1000);
    var h = Math.floor(d / 3600);
    var m = Math.floor((d % 3600) / 60);
    var s = d % 60;
    var timer = (h < 10 ? '0' + h : h) + ':' + (m < 10 ? '0' + m : m) + ':' + (s < 10 ? '0' + s : s);
    
    document.getElementById('timerDisplay').textContent = timer;
    document.getElementById('sNama').textContent = currentSession.nama;
    document.getElementById('sLine').textContent = currentSession.line;
    document.getElementById('sType').textContent = currentSession.type;
    document.getElementById('sLogin').textContent = currentSession.loginTime.toLocaleString('id-ID');
    document.getElementById('sSessionId').textContent = '🆔 Session ID: ' + currentSession.id;
    
    document.getElementById('floatTime').textContent = timer;
    document.getElementById('fNama').textContent = currentSession.nama;
    document.getElementById('fLine').textContent = currentSession.line;
    document.getElementById('fType').textContent = currentSession.type;
    document.getElementById('fSessionId').textContent = '🆔 ID: ' + currentSession.id;
  }

  // ============ FLOATING TIMER ============
  function showFloat() {
    document.getElementById('floatTimer').classList.remove('hidden');
  }

  function hideFloat() {
    document.getElementById('floatTimer').classList.add('hidden');
  }

  function minimizeFloat() {
    var ft = document.getElementById('floatTimer');
    floatMinimized = !floatMinimized;
    if (floatMinimized) {
      ft.classList.add('minimized');
      document.getElementById('floatMinBtn').textContent = '□';
    } else {
      ft.classList.remove('minimized');
      document.getElementById('floatMinBtn').textContent = '─';
    }
  }

  // ============ DRAG FLOATING ============
  document.getElementById('floatHeader').addEventListener('mousedown', function(e) {
    if (e.target.tagName === 'BUTTON') return;
    var ft = document.getElementById('floatTimer');
    var rect = ft.getBoundingClientRect();
    floatDragData.isDragging = true;
    floatDragData.offsetX = e.clientX - rect.left;
    floatDragData.offsetY = e.clientY - rect.top;
    ft.style.cursor = 'grabbing';
  });

  document.addEventListener('mousemove', function(e) {
    if (!floatDragData.isDragging) return;
    var ft = document.getElementById('floatTimer');
    var newX = e.clientX - floatDragData.offsetX;
    var newY = e.clientY - floatDragData.offsetY;
    newX = Math.max(0, Math.min(newX, window.innerWidth - ft.offsetWidth));
    newY = Math.max(0, Math.min(newY, window.innerHeight - ft.offsetHeight));
    ft.style.left = newX + 'px';
    ft.style.top = newY + 'px';
    ft.style.right = 'auto';
    ft.style.bottom = 'auto';
  });

  document.addEventListener('mouseup', function() {
    if (floatDragData.isDragging) {
      floatDragData.isDragging = false;
      document.getElementById('floatTimer').style.cursor = 'default';
    }
  });

  // ============ OPEN URL ============
  function openUrl(url) {
    var input = document.getElementById('urlInput');
    var targetUrl = url || input.value.trim();
    
    if (!targetUrl) {
      showToast('⚠️ Masukkan URL');
      return;
    }
    
    if (!targetUrl.startsWith('http://') && !targetUrl.startsWith('https://')) {
      targetUrl = 'https://' + targetUrl;
    }
    
    var newTab = window.open(targetUrl, '_blank');
    if (!newTab) {
      alert('⚠️ Popup diblokir! Izinkan popup.\n\nKlik ikon popup di address bar.');
      showToast('⚠️ Popup diblokir!');
      return;
    }
    
    showToast('🌐 Membuka: ' + targetUrl);
    input.value = targetUrl;
    
    if (!historyUrls.includes(targetUrl)) {
      historyUrls.push(targetUrl);
      updateHistory();
    }
  }

  // ============ HISTORY ============
  function updateHistory() {
    var list = document.getElementById('historyList');
    var count = document.getElementById('historyCount');
    count.textContent = historyUrls.length;
    
    if (historyUrls.length === 0) {
      list.innerHTML = '<div style="color:#ccc;text-align:center;padding:6px;font-size:11px;">Belum ada history</div>';
      return;
    }
    
    var html = '';
    for (var i = historyUrls.length - 1; i >= 0; i--) {
      var url = historyUrls[i];
      var displayUrl = url.length > 35 ? url.substring(0, 35) + '...' : url;
      html += '<div class="item" onclick="openUrl(\'' + url + '\')">📄 ' + displayUrl + '</div>';
    }
    list.innerHTML = html;
  }

  function clearHistory() {
    if (historyUrls.length === 0) return;
    if (!confirm('Hapus semua history?')) return;
    historyUrls = [];
    updateHistory();
    localStorage.removeItem('browserHistory');
    showToast('🗑️ History dihapus');
  }

  // ============ REQUEST TAB BARU ============
  function requestNewTab() {
    if(!currentSession) {
      alert('⚠️ Silakan login terlebih dahulu.');
      return;
    }

    var reason = prompt('📝 Alasan request tab baru:', '');
    if (!reason) return;

    var tlName = localStorage.getItem('tlName') || '';

    showToast('📩 Mengirim request...');

    fetch(API_URL,{
      method:'POST',
      headers:{'Content-Type':'application/x-www-form-urlencoded'},
      body:'action=requestNewTab&data='+encodeURIComponent(JSON.stringify({
        sessionId: currentSession.id,
        nama: currentSession.nama,
        line: currentSession.line,
        teamLeader: tlName,
        reason: reason
      }))
    })
    .then(function(r){ return r.json(); })
    .then(function(r){
      if(r.success){
        alert('✅ Request terkirim! Tunggu approve dari Team Leader.');
      } else {
        alert('❌ Gagal: ' + (r.message || 'Unknown error'));
      }
    })
    .catch(function(e){
      alert('❌ Gagal: ' + e.message);
    });
  }

  // ============ CEK SESSION ============
  function checkSession() {
    if(!currentSession) {
      alert('Tidak ada session aktif');
      return;
    }

    showToast('🔍 Mengecek session...');

    fetch(API_URL,{
      method:'POST',
      headers:{'Content-Type':'application/x-www-form-urlencoded'},
      body:'action=getDashboard&data='+encodeURIComponent(JSON.stringify({}))
    })
    .then(function(r){ return r.json(); })
    .then(function(d){
      var all = [];
      if(d && d.activeStaff) { if(Array.isArray(d.activeStaff)) all = all.concat(d.activeStaff); }
      if(d && d.activeOJT) { if(Array.isArray(d.activeOJT)) all = all.concat(d.activeOJT); }
      if(d && d.activeDW) { if(Array.isArray(d.activeDW)) all = all.concat(d.activeDW); }

      var found = false;
      for(var i=0;i<all.length;i++){
        var serverId = all[i].row || all[i].sessionId || all[i].id || '';
        if(String(serverId) === String(currentSession.id)){
          found = true;
          break;
        }
      }

      if(found) {
        alert('✅ Session masih aktif!\n\nSession ID: ' + currentSession.id);
      } else if(all.length > 0) {
        alert('⚠️ Sesi TIDAK DITEMUKAN di server!\nAnda mungkin di-force logout.');
        localStorage.removeItem('packingSession');
        currentSession = null;
        if (timerInterval) clearInterval(timerInterval);
        if (checkInterval) clearInterval(checkInterval);
        setTimeout(function() { goBackToLogin(); }, 1500);
      } else {
        alert('⚠️ Data server kosong');
      }
    })
    .catch(function(e){
      alert('❌ Gagal: ' + e.message);
    });
  }

  // ============ AUTO CHECK ============
  function startAutoCheck() {
    if (checkInterval) clearInterval(checkInterval);
    checkInterval = setInterval(function() {
      if (!currentSession) {
        clearInterval(checkInterval);
        checkInterval = null;
        return;
      }
      
      var s = localStorage.getItem('packingSession');
      if (!s) {
        showToast('⚠️ Session berakhir!');
        localStorage.removeItem('packingSession');
        currentSession = null;
        if (timerInterval) clearInterval(timerInterval);
        setTimeout(function() { goBackToLogin(); }, 1500);
        return;
      }
      
      try {
        var p = JSON.parse(s);
        if (p.id !== currentSession.id) {
          showToast('⚠️ Session berakhir!');
          localStorage.removeItem('packingSession');
          currentSession = null;
          if (timerInterval) clearInterval(timerInterval);
          setTimeout(function() { goBackToLogin(); }, 1500);
        }
      } catch(e) {
        showToast('⚠️ Session error!');
        localStorage.removeItem('packingSession');
        currentSession = null;
        if (timerInterval) clearInterval(timerInterval);
        setTimeout(function() { goBackToLogin(); }, 1500);
      }
    }, 10000);
  }

  // ============ GO BACK ============
  function goBackToLogin() {
    var loginUrl = window.location.href.replace('packing.html', 'login.html');
    if (loginUrl === window.location.href) {
      var parts = window.location.href.split('/');
      parts.pop();
      loginUrl = parts.join('/') + '/login.html';
    }
    window.location.href = loginUrl;
  }

  // ============ LOGOUT ============
  function performLogout() {
    if (!currentSession || !confirm('Yakin ingin logout?')) return;

    showToast('🔒 Logout...');

    fetch(API_URL,{
      method:'POST',
      headers:{'Content-Type':'application/x-www-form-urlencoded'},
      body:'action=logout&data='+encodeURIComponent(JSON.stringify({sessionId:currentSession.id}))
    })
    .then(function(r){ return r.json(); })
    .then(function(r){
      if(r.success){
        showToast('🔒 Logout berhasil!');
        if (timerInterval) clearInterval(timerInterval);
        if (checkInterval) clearInterval(checkInterval);
        localStorage.removeItem('packingSession');
        currentSession = null;
        setTimeout(function() { goBackToLogin(); }, 1000);
      } else {
        alert('❌ Gagal logout: ' + r.message);
      }
    })
    .catch(function(e){
      alert('❌ Gagal logout: ' + e.message);
    });
  }

  // ============ INIT ============
  function init() {
    if (!restoreSession()) {
      document.body.innerHTML = '<div style="text-align:center;padding:40px;background:white;border-radius:20px;max-width:350px;margin:auto;"><p style="font-size:48px;">🔒</p><h3>Tidak ada session aktif</h3><p style="color:#666;margin-top:10px;font-size:13px;">Silakan login dari halaman utama.</p><button onclick="goBackToLogin()" style="margin-top:20px;background:#1a73e8;color:white;border:none;padding:10px 25px;border-radius:8px;cursor:pointer;font-weight:700;width:auto;">Kembali ke Login</button></div>';
      return;
    }

    showFloat();

    updateDisplay();
    if (timerInterval) clearInterval(timerInterval);
    timerInterval = setInterval(updateDisplay, 1000);

    startAutoCheck();

    var savedHistory = localStorage.getItem('browserHistory');
    if (savedHistory) {
      try {
        historyUrls = JSON.parse(savedHistory);
        updateHistory();
      } catch(e) {}
    }

    document.getElementById('urlInput').focus();
    showToast('🌐 Browser siap');
  }

  // ============ SAVE HISTORY ============
  function saveHistory() {
    try {
      localStorage.setItem('browserHistory', JSON.stringify(historyUrls));
    } catch(e) {}
  }

  var originalUpdateHistory = updateHistory;
  updateHistory = function() {
    originalUpdateHistory();
    saveHistory();
  };

  window.onload = init;
</script>
</body>
</html>
