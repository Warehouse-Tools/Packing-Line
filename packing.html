<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Packing Line - Browser</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      height: 100%;
      overflow: hidden;
    }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f0f2f5;
      display: flex;
      flex-direction: column;
    }
    
    /* ===== TOOLBAR ===== */
    .toolbar {
      background: white;
      padding: 8px 14px;
      display: flex;
      align-items: center;
      gap: 8px;
      border-bottom: 1px solid #dadce0;
      flex-shrink: 0;
      flex-wrap: wrap;
      z-index: 10;
      box-shadow: 0 2px 8px rgba(0,0,0,0.05);
    }
    .toolbar .brand {
      font-weight: 700;
      color: #1a73e8;
      font-size: 14px;
      white-space: nowrap;
    }
    .toolbar .brand span { color: #333; font-weight: 400; }
    .toolbar .nav-btn {
      background: transparent;
      border: none;
      cursor: pointer;
      font-size: 16px;
      padding: 4px 8px;
      border-radius: 4px;
      color: #555;
      width: auto;
      margin: 0;
      transition: 0.2s;
    }
    .toolbar .nav-btn:hover { background: #e0e0e0; }
    .toolbar .address-bar {
      flex: 1;
      padding: 6px 14px;
      border: 1px solid #dadce0;
      border-radius: 24px;
      font-size: 13px;
      background: white;
      outline: none;
      min-width: 100px;
    }
    .toolbar .address-bar:focus { border-color: #1a73e8; }
    .toolbar .btn-go {
      background: #1a73e8;
      color: white;
      border: none;
      border-radius: 8px;
      padding: 6px 16px;
      cursor: pointer;
      font-weight: 700;
      font-size: 13px;
      width: auto;
      margin: 0;
    }
    .toolbar .btn-go:hover { opacity: 0.9; }
    .toolbar .btn-back-login {
      background: #795548;
      color: white;
      border: none;
      border-radius: 8px;
      padding: 6px 16px;
      cursor: pointer;
      font-weight: 700;
      font-size: 13px;
      width: auto;
      margin: 0;
    }
    .toolbar .btn-back-login:hover { opacity: 0.9; }
    .toolbar .timer-toolbar {
      font-size: 14px;
      font-weight: 700;
      color: #1a73e8;
      background: #e8f0fe;
      padding: 4px 12px;
      border-radius: 12px;
      white-space: nowrap;
    }
    
    /* ===== IFRAME ===== */
    .iframe-container {
      flex: 1;
      background: white;
      position: relative;
      overflow: hidden;
    }
    .iframe-container iframe {
      width: 100%;
      height: 100%;
      border: none;
      background: white;
    }
    .iframe-container .loading {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 18px;
      color: #999;
      text-align: center;
    }
    .iframe-container .loading .spinner {
      display: inline-block;
      width: 36px;
      height: 36px;
      border: 4px solid #f3f3f3;
      border-top: 4px solid #1a73e8;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-bottom: 10px;
    }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    
    /* ===== FLOATING TIMESTAMP ===== */
    .float-timer {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: white;
      border-radius: 14px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.3);
      z-index: 9997;
      border: 1px solid #e0e0e0;
      min-width: 160px;
      max-width: 220px;
      overflow: hidden;
      transition: all 0.3s;
      animation: slideUp 0.3s ease;
      cursor: move;
      user-select: none;
    }
    .float-timer.hidden { display: none; }
    @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    
    .float-header {
      background: #1a73e8;
      color: white;
      padding: 5px 10px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .float-header .title { font-weight: 700; font-size: 10px; }
    .float-header .timer-badge { font-size: 12px; font-weight: 700; background: rgba(255,255,255,0.2); padding: 2px 8px; border-radius: 10px; }
    .float-header .float-actions { display: flex; gap: 3px; }
    .float-header .float-actions button {
      background: rgba(255,255,255,0.2);
      border: none;
      color: white;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      cursor: pointer;
      font-size: 9px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0;
      margin: 0;
      transition: 0.2s;
    }
    .float-header .float-actions button:hover { background: rgba(255,255,255,0.4); }
    .float-header .float-actions .close-float:hover { background: #e53935; }
    
    .float-body {
      padding: 6px 10px;
      font-size: 11px;
    }
    .float-body .row {
      display: flex;
      justify-content: space-between;
      padding: 2px 0;
      border-bottom: 1px solid #f0f0f0;
    }
    .float-body .row:last-child { border-bottom: none; }
    .float-body .label { font-weight: 600; color: #555; }
    .float-body .value { color: #333; }
    .float-body .session-id-small {
      background: #f0f0f0;
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 9px;
      color: #666;
      text-align: center;
      margin-top: 4px;
    }
    
    .float-timer.minimized { min-width: 90px; max-width: 110px; }
    .float-timer.minimized .float-body { display: none; }
    .float-timer.minimized .float-header .timer-badge { display: none; }
    .float-timer.minimized .float-header .title { font-size: 10px; }
    
    /* ===== TOAST ===== */
    .toast {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: #e53935;
      color: white;
      padding: 10px 20px;
      border-radius: 10px;
      font-weight: 700;
      font-size: 13px;
      z-index: 9999;
      display: none;
      box-shadow: 0 4px 20px rgba(0,0,0,0.2);
    }
    .toast.show { display: block; }
    
    @media (max-width: 600px) {
      .toolbar { padding: 5px 8px; gap: 4px; }
      .toolbar .brand { font-size: 11px; }
      .toolbar .address-bar { font-size: 11px; padding: 4px 10px; min-width: 60px; }
      .toolbar .nav-btn { font-size: 14px; padding: 2px 6px; }
      .toolbar .btn-go, .toolbar .btn-back-login { font-size: 11px; padding: 4px 10px; }
      .toolbar .timer-toolbar { font-size: 11px; padding: 2px 8px; }
      .float-timer { min-width: 140px; right: 10px; bottom: 10px; }
    }
  </style>
</head>
<body>

<!-- ===== TOAST ===== -->
<div id="toast" class="toast">⚠️ Notifikasi</div>

<!-- ===== FLOATING TIMESTAMP ===== -->
<div class="float-timer" id="floatTimer">
  <div class="float-header" id="floatHeader">
    <span class="title">⏱️ Sesi</span>
    <span class="timer-badge" id="floatTime">00:00:00</span>
    <div class="float-actions">
      <button onclick="minimizeFloat()" title="Minimize" id="floatMinBtn">─</button>
      <button class="close-float" onclick="hideFloat()" title="Tutup">✕</button>
    </div>
  </div>
  <div class="float-body">
    <div class="row"><span class="label">👤</span><span class="value" id="fNama">-</span></div>
    <div class="row"><span class="label">📍</span><span class="value" id="fLine">-</span></div>
    <div class="row"><span class="label">📌</span><span class="value" id="fType">-</span></div>
    <div class="session-id-small" id="fSessionId">🆔 ID: -</div>
  </div>
</div>

<!-- ===== TOOLBAR ===== -->
<div class="toolbar">
  <span class="brand">🌐 Packing <span>Line</span></span>
  
  <button class="nav-btn" onclick="iframeGoBack()" title="Kembali">◀</button>
  <button class="nav-btn" onclick="iframeGoForward()" title="Maju">▶</button>
  <button class="nav-btn" onclick="iframeRefresh()" title="Refresh">⟳</button>
  <button class="nav-btn" onclick="iframeHome()" title="Home">🏠</button>
  
  <input class="address-bar" id="addressBar" placeholder="Ketik URL..." onkeydown="if(event.key==='Enter'){iframeNavigate();}">
  <button class="btn-go" onclick="iframeNavigate()">Go</button>
  
  <span class="timer-toolbar" id="toolbarTimer">00:00:00</span>
  
  <button class="btn-back-login" onclick="goBackToLogin()">⬅️ Kembali</button>
</div>

<!-- ===== IFRAME ===== -->
<div class="iframe-container">
  <iframe id="mainIframe" src="about:blank"></iframe>
  <div class="loading" id="loadingIndicator">
    <div class="spinner"></div>
    <div>🌐 Memuat...</div>
  </div>
</div>

<script>
  // ============ KONFIGURASI ============
  var API_URL = 'https://script.google.com/macros/s/AKfycbwvQNFe9PVrXnh1rP-s41VWKO-KcLO-NfC-bPdabMbr5V1AvgwEnEizfkiQQPOmy0ug/exec';
  // ============================================

  var currentSession = null;
  var timerInterval = null;
  var checkInterval = null;
  var iframeHistory = [];
  var iframeHistoryIndex = -1;
  var floatMinimized = false;
  var floatDragData = { isDragging: false, offsetX: 0, offsetY: 0 };

  // ============ TOAST ============
  function showToast(msg) {
    var t = document.getElementById('toast');
    t.textContent = msg || '⚠️ Notifikasi';
    t.className = 'toast show';
    clearTimeout(t._t);
    t._t = setTimeout(function(){ t.className = 'toast'; }, 3000);
  }

  // ============ RESTORE SESSION ============
  function restoreSession() {
    var s = localStorage.getItem('packingSession');
    if (s) {
      try {
        var p = JSON.parse(s);
        if (p && p.id && p.nama) {
          currentSession = {
            id: p.id,
            nama: p.nama,
            line: p.line,
            type: p.type,
            teamLeader: p.teamLeader || null,
            loginTime: new Date(p.loginTime)
          };
          return true;
        }
      } catch(e) {
        localStorage.removeItem('packingSession');
      }
    }

    var params = new URLSearchParams(window.location.search);
    var sessionId = params.get('sessionId');
    var nama = params.get('nama');
    var line = params.get('line');
    var type = params.get('type');
    var loginTime = params.get('loginTime');

    if (sessionId && nama && line && type) {
      currentSession = {
        id: sessionId,
        nama: nama,
        line: line,
        type: type,
        teamLeader: params.get('teamLeader') || null,
        loginTime: new Date(loginTime || Date.now())
      };
      var dataToSave = {
        id: sessionId,
        nama: nama,
        line: line,
        type: type,
        teamLeader: params.get('teamLeader') || null,
        loginTime: loginTime || new Date().toISOString()
      };
      localStorage.setItem('packingSession', JSON.stringify(dataToSave));
      return true;
    }

    return false;
  }

  // ============ UPDATE DISPLAY ============
  function updateDisplay() {
    if (!currentSession) return;
    
    var d = Math.floor((new Date() - currentSession.loginTime) / 1000);
    var h = Math.floor(d / 3600);
    var m = Math.floor((d % 3600) / 60);
    var s = d % 60;
    var timer = (h < 10 ? '0' + h : h) + ':' + (m < 10 ? '0' + m : m) + ':' + (s < 10 ? '0' + s : s);
    
    document.getElementById('toolbarTimer').textContent = timer;
    document.getElementById('floatTime').textContent = timer;
    document.getElementById('fNama').textContent = currentSession.nama;
    document.getElementById('fLine').textContent = currentSession.line;
    document.getElementById('fType').textContent = currentSession.type;
    document.getElementById('fSessionId').textContent = '🆔 ID: ' + currentSession.id;
  }

  // ============ FLOATING TIMER ============
  function showFloat() {
    document.getElementById('floatTimer').classList.remove('hidden');
  }

  function hideFloat() {
    document.getElementById('floatTimer').classList.add('hidden');
  }

  function minimizeFloat() {
    var ft = document.getElementById('floatTimer');
    floatMinimized = !floatMinimized;
    if (floatMinimized) {
      ft.classList.add('minimized');
      document.getElementById('floatMinBtn').textContent = '□';
    } else {
      ft.classList.remove('minimized');
      document.getElementById('floatMinBtn').textContent = '─';
    }
  }

  // ============ DRAG FLOATING ============
  document.getElementById('floatHeader').addEventListener('mousedown', function(e) {
    if (e.target.tagName === 'BUTTON') return;
    var ft = document.getElementById('floatTimer');
    var rect = ft.getBoundingClientRect();
    floatDragData.isDragging = true;
    floatDragData.offsetX = e.clientX - rect.left;
    floatDragData.offsetY = e.clientY - rect.top;
    ft.style.cursor = 'grabbing';
  });

  document.addEventListener('mousemove', function(e) {
    if (!floatDragData.isDragging) return;
    var ft = document.getElementById('floatTimer');
    var newX = e.clientX - floatDragData.offsetX;
    var newY = e.clientY - floatDragData.offsetY;
    newX = Math.max(0, Math.min(newX, window.innerWidth - ft.offsetWidth));
    newY = Math.max(0, Math.min(newY, window.innerHeight - ft.offsetHeight));
    ft.style.left = newX + 'px';
    ft.style.top = newY + 'px';
    ft.style.right = 'auto';
    ft.style.bottom = 'auto';
  });

  document.addEventListener('mouseup', function() {
    if (floatDragData.isDragging) {
      floatDragData.isDragging = false;
      document.getElementById('floatTimer').style.cursor = 'default';
    }
  });

  // ============ IFRAME NAVIGATION ============
  function iframeNavigate() {
    var url = document.getElementById('addressBar').value.trim();
    if (!url) {
      showToast('⚠️ Masukkan URL');
      return;
    }
    if (!url.startsWith('http://') && !url.startsWith('https://')) {
      url = 'https://' + url;
    }
    
    var iframe = document.getElementById('mainIframe');
    var loading = document.getElementById('loadingIndicator');
    
    loading.style.display = 'block';
    iframe.src = url;
    
    if (iframeHistoryIndex < iframeHistory.length - 1) {
      iframeHistory = iframeHistory.slice(0, iframeHistoryIndex + 1);
    }
    iframeHistory.push(url);
    iframeHistoryIndex = iframeHistory.length - 1;
    
    showToast('🌐 Membuka: ' + url);
  }

  function iframeGoBack() {
    if (iframeHistoryIndex > 0) {
      iframeHistoryIndex--;
      var url = iframeHistory[iframeHistoryIndex];
      document.getElementById('addressBar').value = url;
      document.getElementById('mainIframe').src = url;
    }
  }

  function iframeGoForward() {
    if (iframeHistoryIndex < iframeHistory.length - 1) {
      iframeHistoryIndex++;
      var url = iframeHistory[iframeHistoryIndex];
      document.getElementById('addressBar').value = url;
      document.getElementById('mainIframe').src = url;
    }
  }

  function iframeRefresh() {
    var iframe = document.getElementById('mainIframe');
    if (iframe.src && iframe.src !== 'about:blank') {
      iframe.src = iframe.src;
      showToast('⟳ Refresh');
    }
  }

  function iframeHome() {
    document.getElementById('addressBar').value = 'https://www.google.com';
    iframeNavigate();
  }

  // ============ AUTO CHECK SESSION ============
  function startAutoCheck() {
    if (checkInterval) clearInterval(checkInterval);
    checkInterval = setInterval(function() {
      if (!currentSession) {
        clearInterval(checkInterval);
        checkInterval = null;
        return;
      }
      
      var s = localStorage.getItem('packingSession');
      if (!s) {
        showToast('⚠️ Session telah berakhir!');
        localStorage.removeItem('packingSession');
        currentSession = null;
        if (timerInterval) clearInterval(timerInterval);
        setTimeout(function() { goBackToLogin(); }, 1500);
        return;
      }
      
      try {
        var p = JSON.parse(s);
        if (p.id !== currentSession.id) {
          showToast('⚠️ Session telah berakhir!');
          localStorage.removeItem('packingSession');
          currentSession = null;
          if (timerInterval) clearInterval(timerInterval);
          setTimeout(function() { goBackToLogin(); }, 1500);
        }
      } catch(e) {
        showToast('⚠️ Session error!');
        localStorage.removeItem('packingSession');
        currentSession = null;
        if (timerInterval) clearInterval(timerInterval);
        setTimeout(function() { goBackToLogin(); }, 1500);
      }
    }, 10000);
  }

  // ============ GO BACK TO LOGIN ============
  function goBackToLogin() {
    var loginUrl = window.location.href.replace('packing.html', 'login.html');
    if (loginUrl === window.location.href) {
      var parts = window.location.href.split('/');
      parts.pop();
      loginUrl = parts.join('/') + '/login.html';
    }
    window.location.href = loginUrl;
  }

  // ============ LOGOUT ============
  function performLogout() {
    if (!currentSession || !confirm('Yakin ingin logout?')) return;

    showToast('🔒 Logout...');

    fetch(API_URL,{
      method:'POST',
      headers:{'Content-Type':'application/x-www-form-urlencoded'},
      body:'action=logout&data='+encodeURIComponent(JSON.stringify({sessionId:currentSession.id}))
    })
    .then(function(r){ return r.json(); })
    .then(function(r){
      if(r.success){
        showToast('🔒 Logout berhasil!');
        if (timerInterval) clearInterval(timerInterval);
        if (checkInterval) clearInterval(checkInterval);
        localStorage.removeItem('packingSession');
        currentSession = null;
        setTimeout(function() { goBackToLogin(); }, 1000);
      } else {
        alert('❌ Gagal logout: ' + r.message);
      }
    })
    .catch(function(e){
      alert('❌ Gagal logout: ' + e.message);
    });
  }

  // ============ INIT ============
  function init() {
    if (!restoreSession()) {
      document.body.innerHTML = '<div style="text-align:center;padding:50px;background:white;border-radius:20px;max-width:400px;margin:auto;"><p style="font-size:48px;">🔒</p><h3>Tidak ada session aktif</h3><p style="color:#666;margin-top:10px;">Silakan login dari halaman utama.</p><button onclick="goBackToLogin()" style="margin-top:20px;background:#1a73e8;color:white;border:none;padding:12px 30px;border-radius:8px;cursor:pointer;font-weight:700;width:auto;">Kembali ke Login</button></div>';
      return;
    }

    showFloat();

    updateDisplay();
    if (timerInterval) clearInterval(timerInterval);
    timerInterval = setInterval(updateDisplay, 1000);

    startAutoCheck();

    // Buka Google default
    document.getElementById('addressBar').value = 'https://www.google.com';
    setTimeout(function() {
      iframeNavigate();
    }, 500);

    showToast('🌐 Browser siap digunakan');
  }

  window.onload = init;
</script>
</body>
</html>
