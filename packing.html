<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Packing Line - Browser</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', sans-serif; background: rgba(0,0,0,0.7); min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px; color: #333; }
    
    /* ===== BROWSER TAB FULL ===== */
    #browserTab {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 9996;
      background: white;
      display: flex;
      flex-direction: column;
    }
    
    .browser-toolbar {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 8px 14px;
      background: #f1f3f4;
      border-bottom: 1px solid #dadce0;
      flex-shrink: 0;
      flex-wrap: wrap;
    }
    .browser-toolbar .nav-btn {
      background: transparent;
      border: none;
      cursor: pointer;
      font-size: 18px;
      padding: 4px 10px;
      border-radius: 4px;
      color: #555;
      width: auto;
      margin: 0;
      transition: 0.2s;
    }
    .browser-toolbar .nav-btn:hover { background: #e0e0e0; }
    .browser-toolbar .address-bar {
      flex: 1;
      padding: 6px 16px;
      border: 1px solid #dadce0;
      border-radius: 24px;
      font-size: 14px;
      background: white;
      outline: none;
      min-width: 120px;
    }
    .browser-toolbar .address-bar:focus { border-color: #1a73e8; }
    .browser-toolbar .btn-back-login {
      background: #795548;
      color: white;
      border: none;
      border-radius: 8px;
      padding: 6px 16px;
      cursor: pointer;
      font-weight: 700;
      font-size: 13px;
      transition: 0.2s;
    }
    .browser-toolbar .btn-back-login:hover { opacity: 0.9; transform: scale(1.02); }
    
    .browser-content {
      flex: 1;
      overflow: hidden;
      background: white;
      position: relative;
    }
    .browser-content iframe {
      width: 100%;
      height: 100%;
      border: none;
      background: white;
    }
    .browser-content .loading {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 20px;
      color: #999;
      text-align: center;
    }
    .browser-content .loading .spinner {
      display: inline-block;
      width: 40px;
      height: 40px;
      border: 4px solid #f3f3f3;
      border-top: 4px solid #1a73e8;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-bottom: 10px;
    }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    
    .browser-content .error-container {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: none;
      justify-content: center;
      align-items: center;
      background: white;
      flex-direction: column;
      padding: 20px;
      text-align: center;
    }
    .browser-content .error-container .icon { font-size: 48px; margin-bottom: 10px; }
    .browser-content .error-container h3 { color: #333; margin-bottom: 10px; }
    .browser-content .error-container p { color: #666; margin-bottom: 15px; max-width: 400px; }
    .browser-content .error-container .open-link {
      display: inline-block;
      background: #1a73e8;
      color: white;
      padding: 10px 24px;
      border-radius: 8px;
      text-decoration: none;
      font-weight: 600;
      cursor: pointer;
      border: none;
      font-size: 14px;
    }
    .browser-content .error-container .open-link:hover { background: #1557b0; }

    /* ===== FLOATING TIMESTAMP ===== */
    #floatTimer {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: white;
      border-radius: 16px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.25);
      z-index: 9997;
      border: 1px solid #e0e0e0;
      min-width: 280px;
      max-width: 340px;
      overflow: hidden;
      transition: all 0.3s;
      animation: slideUp 0.3s ease;
    }
    @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    
    .float-header {
      background: #1a73e8;
      color: white;
      padding: 10px 14px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      cursor: move;
      user-select: none;
    }
    .float-header .title { font-weight: 700; font-size: 13px; }
    .float-header .timer-badge { font-size: 14px; font-weight: 700; background: rgba(255,255,255,0.2); padding: 2px 12px; border-radius: 12px; }
    .float-header .float-actions { display: flex; gap: 4px; }
    .float-header .float-actions button {
      background: rgba(255,255,255,0.2);
      border: none;
      color: white;
      width: 24px;
      height: 24px;
      border-radius: 50%;
      cursor: pointer;
      font-size: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0;
      margin: 0;
      transition: 0.2s;
    }
    .float-header .float-actions button:hover { background: rgba(255,255,255,0.4); }
    .float-header .float-actions .close-float:hover { background: #e53935; }
    
    .float-body {
      padding: 14px 16px;
      font-size: 13px;
    }
    .float-body .session-info { margin-bottom: 10px; }
    .float-body .session-info .row { display: flex; justify-content: space-between; padding: 2px 0; border-bottom: 1px solid #f0f0f0; }
    .float-body .session-info .row .label { font-weight: 600; color: #555; }
    .float-body .session-info .row .value { color: #333; }
    .float-body .session-id { background: #f0f0f0; padding: 4px 10px; border-radius: 4px; font-size: 11px; color: #666; text-align: center; margin-bottom: 10px; }
    .float-body .btn-group { display: flex; flex-direction: column; gap: 6px; }
    .float-body .btn-group button {
      padding: 8px 12px;
      font-size: 12px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-weight: 600;
      width: 100%;
      margin: 0;
      transition: 0.2s;
    }
    .float-body .btn-group button:hover { opacity: 0.9; transform: scale(1.01); }
    .float-body .btn-group .btn-request-tab { background: #ff9800; color: white; }
    .float-body .btn-group .btn-back-browser { background: #795548; color: white; }
    .float-body .btn-group .btn-check { background: #1a73e8; color: white; }
    .float-body .btn-group .btn-logout { background: #e53935; color: white; }
    .float-body .btn-group .btn-back-login { background: #5d4037; color: white; }
    
    #floatTimer.minimized { min-width: 160px; max-width: 200px; }
    #floatTimer.minimized .float-body { display: none; }
    #floatTimer.minimized .float-header .timer-badge { display: none; }
    #floatTimer.minimized .float-header .title { font-size: 12px; }

    @media (max-width: 600px) {
      #floatTimer { min-width: 240px; right: 10px; bottom: 10px; }
      #floatTimer .float-body { padding: 10px 12px; font-size: 12px; }
      .browser-toolbar { padding: 5px 8px; }
      .browser-toolbar .address-bar { font-size: 12px; padding: 4px 10px; }
    }
  </style>
</head>
<body>

<!-- ===== TOAST ===== -->
<div id="toast" style="position:fixed;top:20px;left:50%;transform:translateX(-50%);background:#e53935;color:#fff;padding:15px 30px;border-radius:10px;font-weight:700;font-size:16px;z-index:99999;box-shadow:0 4px 20px rgba(229,57,53,0.4);display:none;animation:slideDown 0.5s ease;"></div>
<style>
  #toast.show { display: block; }
  @keyframes slideDown { from { top: -100px; opacity: 0; } to { top: 20px; opacity: 1; } }
</style>

<!-- ===== BROWSER TAB ===== -->
<div id="browserTab">
  <div class="browser-toolbar">
    <button class="nav-btn" onclick="browserGoBack()" title="Kembali">◀</button>
    <button class="nav-btn" onclick="browserGoForward()" title="Maju">▶</button>
    <button class="nav-btn" onclick="browserRefresh()" title="Refresh">⟳</button>
    <button class="nav-btn" onclick="browserHome()" title="Home">🏠</button>
    <input class="address-bar" id="browserAddress" placeholder="Ketik URL atau search..." onkeydown="if(event.key==='Enter'){browserNavigate(this.value);}">
    <button class="btn-back-login" onclick="goBackToLogin()">⬅️ Kembali ke Login</button>
  </div>
  <div class="browser-content">
    <iframe id="browserIframe" src="about:blank"></iframe>
    <div class="loading" id="browserLoading">
      <div class="spinner"></div>
      <div>🌐 Memuat halaman...</div>
    </div>
    <div class="error-container" id="browserError">
      <div class="icon">🔒</div>
      <h3>Situs tidak bisa ditampilkan di sini</h3>
      <p>Beberapa situs (seperti Google) melarang tampil di dalam bingkai.</p>
      <button class="open-link" onclick="openInNewTab()">📂 Buka di Tab Baru</button>
    </div>
  </div>
</div>

<!-- ===== FLOATING TIMESTAMP ===== -->
<div id="floatTimer">
  <div class="float-header" id="floatHeader">
    <span class="title">⏱️ Sesi Aktif</span>
    <span class="timer-badge" id="floatTime">00:00:00</span>
    <div class="float-actions">
      <button onclick="minimizeFloat()" title="Minimize" id="minimizeBtn">─</button>
      <button class="close-float" onclick="closeFloat()" title="Tutup">✕</button>
    </div>
  </div>
  <div class="float-body">
    <div class="session-info">
      <div class="row"><span class="label">👤 Nama</span><span class="value" id="fNama">-</span></div>
      <div class="row"><span class="label">🏭 Line</span><span class="value" id="fLine">-</span></div>
      <div class="row"><span class="label">📌 Tipe</span><span class="value" id="fType">-</span></div>
      <div class="row"><span class="label">🕐 Login</span><span class="value" id="fLogin">-</span></div>
    </div>
    <div class="session-id" id="fSessionId">🆔 Session ID: -</div>
    <div class="btn-group">
      <button class="btn-request-tab" onclick="requestNewTabToTL()">📩 Request Tab Baru ke TL</button>
      <button class="btn-back-browser" onclick="focusBrowser()">⬅️ Kembali ke Browser</button>
      <button class="btn-back-login" onclick="goBackToLogin()">🏠 Kembali ke Login</button>
      <button class="btn-check" onclick="checkSessionManually()">🔍 CEK SESSION</button>
      <button class="btn-logout" onclick="performLogout()">🔒 LOGOUT</button>
    </div>
  </div>
</div>

<script>
  // ============ KONFIGURASI ============
  var API_URL = 'https://script.google.com/macros/s/AKfycbwvQNFe9PVrXnh1rP-s41VWKO-KcLO-NfC-bPdabMbr5V1AvgwEnEizfkiQQPOmy0ug/exec';
  // ============================================

  var currentSession = null;
  var durationInterval = null;
  var floatMinimized = false;
  var browserHistory = [];
  var browserHistoryIndex = -1;
  var floatDragData = { isDragging: false, offsetX: 0, offsetY: 0 };

  // ============ TOAST ============
  function showToast(msg) {
    var t = document.getElementById('toast');
    t.textContent = msg || '⚠️ Notifikasi';
    t.className = 'toast show';
    clearTimeout(t._t);
    t._t = setTimeout(function(){ t.className = 'toast'; }, 4000);
  }

  // ============ RESTORE SESSION ============
  function restoreSession() {
    var params = new URLSearchParams(window.location.search);
    var sessionId = params.get('sessionId');
    var nama = params.get('nama');
    var line = params.get('line');
    var type = params.get('type');
    var loginTime = params.get('loginTime');

    if (sessionId && nama && line && type) {
      currentSession = {
        id: sessionId,
        nama: nama,
        line: line,
        type: type,
        loginTime: new Date(loginTime || Date.now())
      };
      localStorage.setItem('packingSession', JSON.stringify(currentSession));
      return true;
    }

    var s = localStorage.getItem('packingSession');
    if (s) {
      try {
        var p = JSON.parse(s);
        currentSession = p;
        currentSession.loginTime = new Date(p.loginTime);
        return true;
      } catch(e) {
        localStorage.removeItem('packingSession');
      }
    }
    return false;
  }

  // ============ BROWSER ============
  function browserNavigate(url) {
    if (!url) return;
    if (!url.startsWith('http://') && !url.startsWith('https://')) {
      url = 'https://' + url;
    }
    var address = document.getElementById('browserAddress');
    var iframe = document.getElementById('browserIframe');
    var loading = document.getElementById('browserLoading');
    var error = document.getElementById('browserError');
    
    address.value = url;
    loading.style.display = 'block';
    error.style.display = 'none';
    iframe.style.display = 'block';
    
    iframe.src = url;
    
    iframe.onload = function() {
      loading.style.display = 'none';
      try {
        var doc = iframe.contentDocument || iframe.contentWindow.document;
        if (doc && doc.body) {
          var html = doc.body.innerHTML || '';
          if (html.indexOf('ERR_BLOCKED_BY_X_FRAME_OPTIONS') > -1 || 
              html.indexOf('refused to connect') > -1 ||
              html.indexOf('This page can\'t be displayed') > -1) {
            error.style.display = 'flex';
            iframe.style.display = 'none';
          }
        }
      } catch(e) {
        loading.style.display = 'none';
      }
      setTimeout(function() {
        if (iframe.style.display !== 'none' && iframe.contentDocument) {
          try {
            var body = iframe.contentDocument.body;
            if (body && (body.innerHTML.trim() === '' || body.innerHTML.indexOf('about:blank') > -1)) {
              error.style.display = 'flex';
              iframe.style.display = 'none';
            }
          } catch(e) {}
        }
      }, 3000);
    };
    
    iframe.onerror = function() {
      loading.style.display = 'none';
      error.style.display = 'flex';
      iframe.style.display = 'none';
    };
    
    if (browserHistoryIndex < browserHistory.length - 1) {
      browserHistory = browserHistory.slice(0, browserHistoryIndex + 1);
    }
    browserHistory.push(url);
    browserHistoryIndex = browserHistory.length - 1;
    
    setTimeout(function() {
      loading.style.display = 'none';
    }, 5000);
  }

  function openInNewTab() {
    var url = document.getElementById('browserAddress').value;
    if (url && url !== 'about:blank') {
      window.open(url, '_blank');
      showToast('📂 Dibuka di tab baru: ' + url);
    }
  }

  function browserGoBack() {
    if (browserHistoryIndex > 0) {
      browserHistoryIndex--;
      var url = browserHistory[browserHistoryIndex];
      document.getElementById('browserAddress').value = url;
      document.getElementById('browserIframe').src = url;
    }
  }

  function browserGoForward() {
    if (browserHistoryIndex < browserHistory.length - 1) {
      browserHistoryIndex++;
      var url = browserHistory[browserHistoryIndex];
      document.getElementById('browserAddress').value = url;
      document.getElementById('browserIframe').src = url;
    }
  }

  function browserRefresh() {
    var iframe = document.getElementById('browserIframe');
    if (iframe.src && iframe.src !== 'about:blank') {
      iframe.src = iframe.src;
      showToast('⟳ Refresh');
    }
  }

  function browserHome() {
    browserNavigate('https://www.google.com');
  }

  function focusBrowser() {
    document.getElementById('browserTab').style.display = 'flex';
    document.getElementById('browserAddress').focus();
    showToast('⬅️ Kembali ke browser');
  }

  function goBackToLogin() {
    // Cari file login.html di folder yang sama
    var loginUrl = window.location.href.replace('packing.html', 'login.html');
    // Jika tidak ada perubahan, coba dengan path yang berbeda
    if (loginUrl === window.location.href) {
      var parts = window.location.href.split('/');
      parts.pop();
      loginUrl = parts.join('/') + '/login.html';
    }
    window.location.href = loginUrl;
  }

  // ============ FLOATING TIMESTAMP ============
  function updateFloatTimer() {
    if (!currentSession) return;
    var d = Math.floor((new Date() - currentSession.loginTime) / 1000);
    var h = Math.floor(d / 3600);
    var m = Math.floor((d % 3600) / 60);
    var s = d % 60;
    var timer = (h < 10 ? '0' + h : h) + ':' + (m < 10 ? '0' + m : m) + ':' + (s < 10 ? '0' + s : s);
    document.getElementById('floatTime').textContent = timer;
    document.getElementById('fNama').textContent = currentSession.nama;
    document.getElementById('fLine').textContent = currentSession.line;
    document.getElementById('fType').textContent = currentSession.type;
    document.getElementById('fLogin').textContent = currentSession.loginTime.toLocaleString('id-ID');
    document.getElementById('fSessionId').textContent = '🆔 Session ID: ' + currentSession.id;
  }

  function minimizeFloat() {
    var ft = document.getElementById('floatTimer');
    floatMinimized = !floatMinimized;
    if (floatMinimized) {
      ft.classList.add('minimized');
      document.getElementById('minimizeBtn').textContent = '□';
    } else {
      ft.classList.remove('minimized');
      document.getElementById('minimizeBtn').textContent = '─';
    }
  }

  function closeFloat() {
    document.getElementById('floatTimer').style.display = 'none';
    if (durationInterval) {
      clearInterval(durationInterval);
      durationInterval = null;
    }
  }

  // ============ DRAG FLOATING ============
  document.getElementById('floatHeader').addEventListener('mousedown', function(e) {
    if (e.target.tagName === 'BUTTON') return;
    var ft = document.getElementById('floatTimer');
    var rect = ft.getBoundingClientRect();
    floatDragData.isDragging = true;
    floatDragData.offsetX = e.clientX - rect.left;
    floatDragData.offsetY = e.clientY - rect.top;
    ft.style.cursor = 'grabbing';
  });

  document.addEventListener('mousemove', function(e) {
    if (!floatDragData.isDragging) return;
    var ft = document.getElementById('floatTimer');
    var newX = e.clientX - floatDragData.offsetX;
    var newY = e.clientY - floatDragData.offsetY;
    newX = Math.max(0, Math.min(newX, window.innerWidth - ft.offsetWidth));
    newY = Math.max(0, Math.min(newY, window.innerHeight - ft.offsetHeight));
    ft.style.left = newX + 'px';
    ft.style.top = newY + 'px';
    ft.style.right = 'auto';
    ft.style.bottom = 'auto';
  });

  document.addEventListener('mouseup', function() {
    if (floatDragData.isDragging) {
      floatDragData.isDragging = false;
      document.getElementById('floatTimer').style.cursor = 'default';
    }
  });

  // ============ REQUEST TAB BARU ============
  function requestNewTabToTL() {
    if(!currentSession) {
      alert('⚠️ Silakan login terlebih dahulu.');
      return;
    }

    var reason = prompt('📝 Alasan request tab baru:', 'Membutuhkan tab tambahan untuk bekerja');
    if (!reason) return;

    var tlName = localStorage.getItem('tlName') || '';

    showToast('📩 Mengirim request ke TL...');

    fetch(API_URL,{
      method:'POST',
      headers:{'Content-Type':'application/x-www-form-urlencoded'},
      body:'action=requestNewTab&data='+encodeURIComponent(JSON.stringify({
        sessionId: currentSession.id,
        nama: currentSession.nama,
        line: currentSession.line,
        teamLeader: tlName,
        reason: reason
      }))
    })
    .then(function(r){ return r.json(); })
    .then(function(r){
      if(r.success){
        alert('✅ Request terkirim! Tunggu approve dari Team Leader.');
        showToast('📩 Request terkirim. Tunggu approve dari TL.');
      } else {
        alert('❌ Gagal: ' + (r.message || 'Unknown error'));
      }
    })
    .catch(function(e){
      alert('❌ Gagal mengirim request: ' + e.message);
    });
  }

  // ============ CEK SESSION MANUAL ============
  function checkSessionManually() {
    if(!currentSession) {
      alert('Tidak ada session aktif');
      return;
    }

    showToast('🔍 Mengecek session...');

    var params = {};

    fetch(API_URL,{
      method:'POST',
      headers:{'Content-Type':'application/x-www-form-urlencoded'},
      body:'action=getDashboard&data='+encodeURIComponent(JSON.stringify(params))
    })
    .then(function(r){ return r.json(); })
    .then(function(d){
      var all = [];
      if(d && d.activeStaff) { if(Array.isArray(d.activeStaff)) all = all.concat(d.activeStaff); }
      if(d && d.activeOJT) { if(Array.isArray(d.activeOJT)) all = all.concat(d.activeOJT); }
      if(d && d.activeDW) { if(Array.isArray(d.activeDW)) all = all.concat(d.activeDW); }

      var found = false;
      for(var i=0;i<all.length;i++){
        var serverId = all[i].row || all[i].sessionId || all[i].id || '';
        if(String(serverId) === String(currentSession.id)){
          found = true;
          break;
        }
      }

      if(found) {
        alert('✅ Session masih aktif di server!\n\nSession ID: ' + currentSession.id);
      } else if(all.length > 0) {
        alert('⚠️ Sesi anda TIDAK DITEMUKAN di server!\nAnda mungkin sudah di-force logout oleh Team Leader.');
        if (durationInterval) {
          clearInterval(durationInterval);
          durationInterval = null;
        }
        clearSavedSession();
        currentSession = null;
        closeFloat();
        document.getElementById('floatTimer').style.display = 'none';
        document.getElementById('browserTab').style.display = 'none';
        showToast('⚠️ Sesi telah diakhiri oleh Team Leader.');
        setTimeout(function() {
          goBackToLogin();
        }, 1500);
      } else {
        alert('⚠️ Tidak bisa mengecek session (data server kosong)');
      }
    })
    .catch(function(e){
      alert('❌ Gagal cek session: ' + e.message);
    });
  }

  function clearSavedSession() {
    localStorage.removeItem('packingSession');
  }

  // ============ LOGOUT ============
  function performLogout() {
    if (!currentSession || !confirm('Yakin ingin logout?')) return;

    fetch(API_URL,{
      method:'POST',
      headers:{'Content-Type':'application/x-www-form-urlencoded'},
      body:'action=logout&data='+encodeURIComponent(JSON.stringify({sessionId:currentSession.id}))
    })
    .then(function(r){return r.json()})
    .then(function(r){
      if(r.success){
        showToast('🔒 Logout berhasil!');
        if (durationInterval) {
          clearInterval(durationInterval);
          durationInterval = null;
        }
        clearSavedSession();
        currentSession = null;
        closeFloat();
        document.getElementById('floatTimer').style.display = 'none';
        document.getElementById('browserTab').style.display = 'none';
        setTimeout(function() {
          goBackToLogin();
        }, 1000);
      } else {
        alert('❌ Gagal logout: ' + r.message);
      }
    })
    .catch(function(e){
      alert('❌ Gagal logout: ' + e.message);
    });
  }

  // ============ INIT ============
  function init() {
    if (!restoreSession()) {
      document.getElementById('browserTab').style.display = 'none';
      document.getElementById('floatTimer').style.display = 'none';
      document.body.innerHTML = '<div style="text-align:center;padding:40px;background:white;border-radius:20px;max-width:400px;margin:auto;"><p style="font-size:48px;">🔒</p><h3>Tidak ada session aktif</h3><p style="color:#666;margin-top:10px;">Silakan login dari halaman utama.</p><button onclick="goBackToLogin()" style="margin-top:20px;background:#1a73e8;color:white;border:none;padding:12px 30px;border-radius:8px;cursor:pointer;font-weight:700;width:auto;">Kembali ke Login</button></div>';
      return;
    }

    document.getElementById('floatTimer').style.display = 'block';
    updateFloatTimer();
    if (durationInterval) clearInterval(durationInterval);
    durationInterval = setInterval(updateFloatTimer, 1000);

    // Buka Google di browser
    setTimeout(function() {
      browserNavigate('https://www.google.com');
    }, 300);
  }

  window.onload = init;
</script>
</body>
</html>
